name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['^12.0', '^13.0']
        include:
          - laravel: '^12.0'
            testbench: '^10.0'
          - laravel: '^13.0'
            testbench: '^11.0'
        exclude:
          # Laravel 13 requires PHP 8.3+.
          - php: '8.2'
            laravel: '^13.0'

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          # Advisory scanning of dependencies is handled by Dependabot, not the CI resolver.
          composer config --no-plugins policy.advisories.block false || true
          composer require --no-update --dev "orchestra/testbench:${{ matrix.testbench }}"
          composer require --no-update "illuminate/support:${{ matrix.laravel }}" "illuminate/http:${{ matrix.laravel }}"
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit

  # Aggregate gate so branch protection can require a single stable "tests" check
  # instead of every individual matrix combination.
  tests-pass:
    name: tests
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    steps:
      - name: Verify all matrix jobs passed
        run: '[ "${{ needs.tests.result }}" = "success" ]'

  phpstan:
    name: phpstan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: |
          composer config --no-plugins policy.advisories.block false || true
          composer update --prefer-dist --no-interaction

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  pint:
    name: pint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: |
          composer config --no-plugins policy.advisories.block false || true
          composer update --prefer-dist --no-interaction

      - name: Pint
        run: vendor/bin/pint --test

  deptrac:
    name: deptrac
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: |
          composer config --no-plugins policy.advisories.block false || true
          composer update --prefer-dist --no-interaction

      - name: Deptrac
        run: vendor/bin/deptrac analyse --no-progress

  coverage:
    name: coverage
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # PCOV is the fast coverage driver; yaml parses the VNG specs the contract suite reads.
          extensions: yaml
          coverage: pcov

      - name: Install dependencies
        run: |
          composer config --no-plugins policy.advisories.block false || true
          composer update --prefer-dist --no-interaction

      - name: Cache fetched specs
        uses: actions/cache@v4
        with:
          path: tests/fixtures/specs
          key: zgw-specs-${{ hashFiles('tests/Contract/releases.json') }}-all

      # Fetch every release so the contract suite runs in full and coverage is representative.
      - name: Fetch specs
        run: php scripts/fetch-specs.php

      - name: Run tests with coverage
        run: vendor/bin/phpunit --coverage-cobertura build/coverage/cobertura.xml

      - name: Summarise coverage
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: build/coverage/cobertura.xml
          format: markdown
          output: both
          badge: true
          # Show the number; do not fail the build on it.
          fail_below_min: false
          thresholds: '60 80'

      - name: Write coverage to the job summary
        if: always()
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage on the pull request
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          recreate: true
          path: code-coverage-results.md
