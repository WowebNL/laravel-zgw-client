name: Contract

# Validates the client against the real VNG ZGW OpenAPI specs for every supported release.
# Kept separate from ci.yml so the contract matrix (per ZGW release) does not multiply the
# PHP x Laravel matrix.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    name: Contract (ZGW ${{ matrix.release }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        release: ['1.5', '1.6', '1.7']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # libyaml parses the VNG specs that the strict pure-PHP YAML parser rejects.
          extensions: yaml
          coverage: none

      - name: Install dependencies
        run: |
          composer config --no-plugins policy.advisories.block false || true
          composer update --prefer-dist --no-interaction

      - name: Cache fetched specs
        uses: actions/cache@v4
        with:
          path: tests/fixtures/specs
          key: zgw-specs-${{ hashFiles('tests/Contract/releases.json') }}-${{ matrix.release }}

      - name: Fetch specs for this release
        run: php scripts/fetch-specs.php --release=${{ matrix.release }}

      - name: Run contract tests
        run: vendor/bin/phpunit --testsuite Contract

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zgw-coverage-${{ matrix.release }}
          path: build/zgw-coverage-${{ matrix.release }}.md
          if-no-files-found: ignore

  # Aggregate gate so branch protection can require a single stable "contract" check.
  contract-pass:
    name: contract
    runs-on: ubuntu-latest
    needs: contract
    if: always()
    steps:
      - name: Verify all matrix jobs passed
        run: '[ "${{ needs.contract.result }}" = "success" ]'
